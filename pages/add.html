<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter une Publication - Blog du CEPI</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <!-- React Root Header -->
    <div id="header-root"></div>

    <!-- Main Content -->
    <main class="py-5">
        <div class="container">
            <div id="add-root"></div>
        </div>
    </main>

    <!-- React Root Footer -->
    <div id="footer-root"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- React CDN (ordre requis: React, ReactDOM, Babel) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;
        const API_URL = 'http://localhost:3000';

        function Header() {
            return (
                <nav className="navbar navbar-expand-lg navbar-dark bg-dark">
                    <div className="container-fluid">
                        <a className="navbar-brand" href="index.html">
                            <img src="../img/Logo.png" alt="CEPI Logo" className="logo-img" />
                        </a>
                        <button className="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                            <span className="navbar-toggler-icon"></span>
                        </button>
                        <div className="collapse navbar-collapse" id="navbarNav">
                            <ul className="navbar-nav ms-auto">
                                <li className="nav-item"><a className="nav-link" href="index.html">Menu1</a></li>
                                <li className="nav-item"><a className="nav-link" href="#">Menu2</a></li>
                                <li className="nav-item"><a className="nav-link" href="#">Menu3</a></li>
                                <li className="nav-item"><a className="nav-link" href="#">Menu4</a></li>
                                <li className="nav-item">
                                    <a className="nav-link user-icon" href="#">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                            <circle cx="12" cy="8" r="4"></circle>
                                            <path d="M6 20c0-3.314 2.686-6 6-6s6 2.686 6 6"></path>
                                        </svg>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </nav>
            );
        }

        function Footer() {
            return (
                <footer className="bg-dark text-white py-4 mt-5">
                    <div className="container">
                        <div className="row">
                            <div className="col-md-12 text-center">
                                <div className="social-links mb-3">
                                    <a href="#" className="text-white me-3">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                                        </svg>
                                    </a>
                                    <a href="#" className="text-white me-3">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                            <path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/>
                                        </svg>
                                    </a>
                                    <a href="#" className="text-white">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                            <circle cx="4" cy="4" r="2"></circle>
                                        </svg>
                                    </a>
                                </div>
                                <p className="mb-2">Centre d'Expertise et de Perfectionnement en Informatique</p>
                                <p className="mb-0">© 2026</p>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        }

        function AddArticleForm() {
            const [title, setTitle] = useState('');
            const [author, setAuthor] = useState('');
            const [image, setImage] = useState('');
            const [summary, setSummary] = useState('');
            const [content, setContent] = useState('');
            const [submitting, setSubmitting] = useState(false);

            function handleSubmit(event) {
                event.preventDefault();

                const confirmed = window.confirm('Êtes-vous sûr de vouloir publier cet article?');
                if (!confirmed) return;

                setSubmitting(true);

                fetch(`${API_URL}/articles`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title.trim(),
                        author: author.trim(),
                        date: new Date().toISOString().split('T')[0],
                        image: image.trim(),
                        summary: summary.trim(),
                        content: content.trim()
                    })
                })
                    .then((response) => {
                        if (!response.ok) throw new Error('Erreur de publication');
                        return response.json();
                    })
                    .then(() => {
                        alert('Article publié avec succès!');
                        window.location.href = 'index.html';
                    })
                    .catch(() => {
                        alert("Erreur lors de la publication de l'article. Vérifiez que l'API est démarrée.");
                    })
                    .finally(() => {
                        setSubmitting(false);
                    });
            }

            return (
                <div className="row">
                    <div className="col-12 col-lg-8 mx-auto">
                        <h1 className="mb-4">Ajouter une Publication</h1>

                        <form id="addArticleForm" onSubmit={handleSubmit}>
                            <div className="mb-3">
                                <label htmlFor="title" className="form-label">Titre *</label>
                                <input id="title" type="text" className="form-control" required value={title} onChange={(e) => setTitle(e.target.value)} />
                            </div>

                            <div className="mb-3">
                                <label htmlFor="author" className="form-label">Auteur *</label>
                                <input id="author" type="text" className="form-control" required value={author} onChange={(e) => setAuthor(e.target.value)} />
                            </div>

                            <div className="mb-3">
                                <label htmlFor="image" className="form-label">URL de l'image *</label>
                                <input id="image" type="url" className="form-control" required value={image} onChange={(e) => setImage(e.target.value)} />
                                <small className="form-text text-muted">Entrez l'URL complète de l'image</small>
                            </div>

                            <div className="mb-3">
                                <label htmlFor="summary" className="form-label">Résumé *</label>
                                <textarea id="summary" className="form-control" rows="3" required value={summary} onChange={(e) => setSummary(e.target.value)}></textarea>
                            </div>

                            <div className="mb-3">
                                <label htmlFor="content" className="form-label">Contenu *</label>
                                <textarea id="content" className="form-control" rows="10" required value={content} onChange={(e) => setContent(e.target.value)}></textarea>
                                <small className="form-text text-muted">Vous pouvez utiliser des balises HTML pour la mise en forme</small>
                            </div>

                            <div className="d-flex gap-2">
                                <button type="submit" className="btn btn-primary" disabled={submitting}>
                                    {submitting ? 'Publication...' : 'Publier'}
                                </button>
                                <a href="index.html" className="btn btn-secondary">Annuler</a>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('header-root')).render(<Header />);
        ReactDOM.createRoot(document.getElementById('add-root')).render(<AddArticleForm />);
        ReactDOM.createRoot(document.getElementById('footer-root')).render(<Footer />);
    </script>
</body>
</html>
