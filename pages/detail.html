<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail de la Publication - Blog du CEPI</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <!-- React Root Header -->
    <div id="header-root"></div>

    <!-- Main Content -->
    <main class="py-5">
        <div class="container">
            <!-- React Root Blog -->
            <div id="blog-root"></div>
        </div>
    </main>

    <!-- React Root Footer -->
    <div id="footer-root"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- React CDN (ordre requis: React, ReactDOM, Babel) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useEffect, useState } = React;
        const API_URL = 'http://localhost:3000';

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('fr-FR', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function Header() {
            return (
                <nav className="navbar navbar-expand-lg navbar-dark bg-dark">
                    <div className="container-fluid">
                        <a className="navbar-brand" href="index.html">
                            <img src="../img/Logo.png" alt="CEPI Logo" className="logo-img" />
                        </a>
                        <button className="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                            <span className="navbar-toggler-icon"></span>
                        </button>
                        <div className="collapse navbar-collapse" id="navbarNav">
                            <ul className="navbar-nav ms-auto">
                                <li className="nav-item"><a className="nav-link" href="index.html">Menu1</a></li>
                                <li className="nav-item"><a className="nav-link" href="#">Menu2</a></li>
                                <li className="nav-item"><a className="nav-link" href="#">Menu3</a></li>
                                <li className="nav-item"><a className="nav-link" href="#">Menu4</a></li>
                                <li className="nav-item">
                                    <a className="nav-link user-icon" href="#">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                            <circle cx="12" cy="8" r="4"></circle>
                                            <path d="M6 20c0-3.314 2.686-6 6-6s6 2.686 6 6"></path>
                                        </svg>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </nav>
            );
        }

        function Footer() {
            return (
                <footer className="bg-dark text-light py-4 mt-5">
                    <div className="container">
                        <div className="row">
                            <div className="col-12 text-center">
                                <div className="social-links d-flex justify-content-center mb-3">
                                    <a href="#" className="text-light me-3">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                            <path d="M18 2h-3a6 6 0 0 0-6 6v3H7v4h2v8h4v-8h3l1-4h-4V8a2 2 0 0 1 2-2h3z"></path>
                                        </svg>
                                    </a>
                                    <a href="#" className="text-light me-3">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                                        </svg>
                                    </a>
                                    <a href="#" className="text-light">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                            <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"></path>
                                            <circle cx="4" cy="4" r="2"></circle>
                                        </svg>
                                    </a>
                                </div>
                                <p className="mb-2">Centre d'Expertise et de Perfectionnement en Informatique</p>
                                <p className="mb-0">© 2026</p>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        }

        function BlogDetails({ articleId }) {
            const [article, setArticle] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');

            useEffect(() => {
                setLoading(true);
                setError('');

                fetch(`${API_URL}/articles/${articleId}`)
                    .then((response) => {
                        if (!response.ok) throw new Error('Article non trouvé');
                        return response.json();
                    })
                    .then((data) => {
                        setArticle(data);
                        document.title = `${data.title} - Blog du CEPI`;
                        setLoading(false);
                    })
                    .catch(() => {
                        setError('Article non trouvé');
                        setLoading(false);
                    });
            }, [articleId]);

            if (loading) return <p>Chargement de l'article...</p>;
            if (error) {
                return (
                    <div className="alert alert-warning text-center">
                        <h2>Article non trouvé</h2>
                        <p>L'article que vous recherchez n'existe pas ou a été supprimé.</p>
                    </div>
                );
            }

            return (
                <article className="blog-article">
                    <img src={article.image} className="img-fluid mb-4" alt={article.title} />
                    <header className="mb-4">
                        <h1 className="display-4 mb-3">{article.title}</h1>
                        <div className="article-meta text-muted">
                            <span>Publié le {formatDate(article.date)}</span> | <span>Par {article.author}</span>
                        </div>
                    </header>
                    <div className="article-content" dangerouslySetInnerHTML={{ __html: article.content }}></div>
                </article>
            );
        }

        function Comment({ date, content }) {
            return (
                <div className="comment mb-4 pb-4 border-bottom">
                    <div className="comment-meta text-muted mb-2">
                        <small>{formatDate(date)}</small>
                    </div>
                    <div className="comment-content">
                        <p>{content}</p>
                    </div>
                </div>
            );
        }

        function CommentList({ articleId, refreshKey }) {
            const [comments, setComments] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');

            useEffect(() => {
                setLoading(true);
                setError('');

                fetch(`${API_URL}/comments?articleId=${articleId}`)
                    .then((response) => {
                        if (!response.ok) throw new Error('Erreur commentaires');
                        return response.json();
                    })
                    .then((data) => {
                        setComments(data);
                        setLoading(false);
                    })
                    .catch(() => {
                        setError('Erreur lors du chargement des commentaires.');
                        setLoading(false);
                    });
            }, [articleId, refreshKey]);

            if (loading) return <p>Chargement des commentaires...</p>;
            if (error) return <p className="text-danger">{error}</p>;
            if (comments.length === 0) {
                return <p className="text-muted">Aucun commentaire pour le moment. Soyez le premier à commenter!</p>;
            }

            return (
                <div className="comments-list">
                    {comments.map((comment) => (
                        <Comment key={comment.id} date={comment.date} content={comment.content} />
                    ))}
                </div>
            );
        }

        function AddComment({ articleId, onAdded }) {
            const [content, setContent] = useState('');
            const [submitting, setSubmitting] = useState(false);

            function handleSubmit(event) {
                event.preventDefault();
                const clean = content.trim();
                if (!clean) {
                    alert('Veuillez entrer un commentaire.');
                    return;
                }

                setSubmitting(true);

                fetch(`${API_URL}/comments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        articleId,
                        date: new Date().toISOString(),
                        content: clean
                    })
                })
                    .then((response) => {
                        if (!response.ok) throw new Error('Erreur ajout commentaire');
                        return response.json();
                    })
                    .then(() => {
                        setContent('');
                        onAdded();
                    })
                    .catch(() => {
                        alert("Erreur lors de l'ajout du commentaire.");
                    })
                    .finally(() => {
                        setSubmitting(false);
                    });
            }

            return (
                <form id="commentForm" className="comment-form mb-5" onSubmit={handleSubmit}>
                    <textarea
                        id="commentTextarea"
                        className="form-control border-dark mb-3"
                        rows="5"
                        placeholder="Ajouter un commentaire..."
                        value={content}
                        onChange={(e) => setContent(e.target.value)}
                    ></textarea>
                    <div className="text-end">
                        <button type="submit" className="btn btn-dark" disabled={submitting}>
                            {submitting ? 'Envoi...' : 'Submit'}
                        </button>
                    </div>
                </form>
            );
        }

        function Blog() {
            const params = new URLSearchParams(window.location.search);
            const articleId = Number(params.get('id'));
            const [refreshKey, setRefreshKey] = useState(0);

            if (!articleId) {
                return (
                    <div className="row">
                        <div className="col-12 col-lg-8 mx-auto">
                            <div className="alert alert-warning text-center">
                                <h2>Article non trouvé</h2>
                                <p>ID invalide ou manquant dans l'URL.</p>
                                <a href="index.html" className="btn btn-secondary mt-3">Retour à l'accueil</a>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="row">
                    <div className="col-12 col-lg-8 mx-auto">
                        <BlogDetails articleId={articleId} />

                        <div className="comments-section mt-5 pt-4 border-top">
                            <h3 className="mb-4">Commentaires</h3>
                            <AddComment articleId={articleId} onAdded={() => setRefreshKey((value) => value + 1)} />
                            <CommentList articleId={articleId} refreshKey={refreshKey} />
                        </div>

                        <div className="mt-5">
                            <a href="index.html" className="btn btn-secondary">← Retour à l'accueil</a>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('header-root')).render(<Header />);
        ReactDOM.createRoot(document.getElementById('blog-root')).render(<Blog />);
        ReactDOM.createRoot(document.getElementById('footer-root')).render(<Footer />);
    </script>
</body>
</html>
